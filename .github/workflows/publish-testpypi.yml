name: Publish TestPyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read # to check out code
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache: false

      - name: Build distributions (dev version)
        run: |
          VERSION=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)
          DEV_VERSION="${VERSION}.dev$(date -u +%Y%m%d%H%M%S)"
          echo "Building: $DEV_VERSION"
          sed -i "s/^version = \".*\"/version = \"$DEV_VERSION\"/" pyproject.toml
          uv build && uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read # to download artifacts
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache: false

      - name: Verify clean wheel install
        env:
          VIRTUAL_ENV: .venv-smoke
        run: |
          uv venv .venv-smoke
          uv pip install dist/*.whl
          uv run python - <<'PY'
          import importlib.metadata as metadata
          import physicalai_rebot_b601_plugin
          print(metadata.version("physicalai-rebot-b601-plugin"))
          PY

  publish:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: smoke-test
    permissions:
      id-token: write # for OIDC trusted publishing
    environment:
      name: testpypi
      url: https://test.pypi.org/p/physicalai-rebot-b601-plugin
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
