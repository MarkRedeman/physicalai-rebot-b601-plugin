name: Publish TestPyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build all packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache: false
          enable-cache: false

      - name: Build distributions (dev version)
        run: |
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          mkdir -p dist_all
          for PKG in packages/*/; do
            PKG_NAME=$(basename "$PKG")
            echo "Building $PKG_NAME..."

            # Determine base version from latest matching tag
            LATEST_TAG=$(git tag --list "${PKG_NAME}-v*" --sort=-v:refname | head -1)
            if [ -n "$LATEST_TAG" ]; then
              BASE_VERSION=$(echo "$LATEST_TAG" | sed 's/.*-v//')
            else
              BASE_VERSION="0.0.0"
            fi

            DEV_VERSION="${BASE_VERSION}.dev${TIMESTAMP}"
            echo "  Version: $DEV_VERSION (base: $BASE_VERSION, from tag: ${LATEST_TAG:-none})"

            SETUPTOOLS_SCM_PRETEND_VERSION="$DEV_VERSION" uv build --directory "$PKG" --out-dir "$PKG"dist
            cp "$PKG"dist/*.whl "$PKG"dist/*.tar.gz dist_all/ 2>/dev/null || true
          done
          uvx twine check dist_all/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist_all/

  smoke-test:
    name: Smoke test all packages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache: false
          enable-cache: false

      - name: Verify clean wheel installs
        env:
          VIRTUAL_ENV: .venv-smoke
        run: |
          uv venv .venv-smoke
          uv pip install dist/*.whl
          uv run python -c "
          import json, importlib.metadata as metadata
          with open('.github/release-please-config.json') as f:
              config = json.load(f)
          for path, pkg in config['packages'].items():
              name = pkg['package-name']
              try:
                  v = metadata.version(name)
                  print(f'{name}: {v}')
              except Exception as e:
                  print(f'{name}: NOT FOUND ({e})')
          "

  publish:
    name: Publish to TestPyPI
    needs: smoke-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # needed to authenticate with TestPyPI via OIDC
    environment:
      name: testpypi
      url: https://test.pypi.org/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
