name: Release Please

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create releases and tags
      pull-requests: write # to create release PRs
    outputs:
      packages: ${{ steps.packages.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - id: packages
        run: |
          echo "matrix=$(jq -c '[.packages | to_entries[] | {name: .value["package-name"], path: .key}]' .github/release-please-config.json)" >> $GITHUB_OUTPUT

      - id: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          target-branch: main
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.package.name }}
    needs: release-please
    if: ${{ fromJSON(needs.release-please.outputs[format('{0}--release_created', matrix.package.path)]) }}
    strategy:
      matrix:
        package: ${{ fromJSON(needs.release-please.outputs.packages) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release-please.outputs[format('{0}--tag_name', matrix.package.path)] }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache: false
          enable-cache: false

      - name: Build
        working-directory: ${{ matrix.package.path }}
        run: |
          mkdir -p dist
          uv build --out-dir dist && uvx twine check dist/*

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.package.name }}-dist
          path: ${{ matrix.package.path }}/dist/

  smoke:
    name: Smoke test ${{ matrix.package.name }}
    needs: [release-please, build]
    if: ${{ fromJSON(needs.release-please.outputs[format('{0}--release_created', matrix.package.path)]) }}
    strategy:
      matrix:
        package: ${{ fromJSON(needs.release-please.outputs.packages) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # to download artifacts
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.package.name }}-dist
          path: dist/

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache: false
          enable-cache: false

      - name: Verify clean wheel install
        env:
          VIRTUAL_ENV: .venv-smoke
          PKG_NAME: ${{ matrix.package.name }}
        run: |
          uv venv .venv-smoke
          uv pip install dist/*.whl
          uv run python -c "
          import importlib.metadata as metadata, os
          print(metadata.version(os.environ['PKG_NAME']))
          "

  publish:
    name: Publish ${{ matrix.package.name }} to PyPI
    needs: [release-please, smoke]
    if: ${{ fromJSON(needs.release-please.outputs[format('{0}--release_created', matrix.package.path)]) }}
    strategy:
      matrix:
        package: ${{ fromJSON(needs.release-please.outputs.packages) }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # needed to authenticate with PyPI via OIDC
    environment:
      name: pypi
      url: https://pypi.org/p/${{ matrix.package.name }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.package.name }}-dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
