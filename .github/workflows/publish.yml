name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  identify:
    name: Identify package
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout the repo and read release-please config
    outputs:
      package: ${{ steps.parse.outputs.package }}
      path: ${{ steps.parse.outputs.path }}
      pypi_name: ${{ steps.parse.outputs.pypi_name }}
      import_name: ${{ steps.parse.outputs.import_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Parse tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        id: parse
        run: |
          PKG_NAME=$(echo "$TAG" | sed 's/-v[0-9].*//')
          RESULT=$(jq -r --arg pkg "$PKG_NAME" '
            .packages | to_entries[] |
            select(.value["package-name"] == $pkg) |
            "package=\(.value["package-name"])\npath=\(.key)\npypi_name=\(.value["package-name"])"
          ' .github/release-please-config.json)
          if [ -z "$RESULT" ]; then
            echo "::error::Unknown package from tag: $TAG"
            exit 1
          fi
          echo -e "$RESULT" >> $GITHUB_OUTPUT
          echo "import_name=$(echo "$PKG_NAME" | tr '-' '_')" >> $GITHUB_OUTPUT

  build:
    name: Build
    needs: identify
    if: needs.identify.outputs.package != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout the repo and build
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache: false
          enable-cache: false

      - name: Build distributions
        working-directory: ${{ needs.identify.outputs.path }}
        run: |
          mkdir -p dist
          uv build --out-dir dist && uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: ${{ needs.identify.outputs.path }}/dist/

  smoke-test:
    name: Smoke test
    needs:
      - identify
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read # to download artifacts
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          cache: false
          enable-cache: false

      - name: Verify clean wheel install
        env:
          VIRTUAL_ENV: .venv-smoke
          IMPORT_NAME: ${{ needs.identify.outputs.import_name }}
          PYPI_NAME: ${{ needs.identify.outputs.pypi_name }}
        run: |
          uv venv .venv-smoke
          uv pip install dist/*.whl
          uv run python -c "
          import importlib.metadata as metadata
          import importlib, os
          importlib.import_module(os.environ['IMPORT_NAME'])
          print(metadata.version(os.environ['PYPI_NAME']))
          "

  publish:
    name: Publish to PyPI
    needs:
      - identify
      - smoke-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write # needed to authenticate with PyPI via OIDC
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.identify.outputs.pypi_name }}
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
