[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = ["pytest", "mypy", "ruff>=0.15.12", "prek", "pyrefly>=0.58.0"]

[tool.ruff]
target-version = "py313"
line-length = 120
preview = true
src = ["packages/*/src"]
extend-exclude = ["urdf", "examples"]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "COM812",
    "CPY001",
]
fixable = ["ALL"]
unfixable = []

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = [
    "D",
    "INP001",
    "T201",
]
"packages/*/tests/**/*.py" = [
    "ARG001",
    "ARG002",
    "B903",
    "D",
    "INP001",
    "PLC0415",
    "PLC1901",
    "PLC2701",
    "PLR2004",
    "PLR6301",
    "RUF069",
    "S101",
]
"packages/physicalai-rebot-b601-plugin/src/physicalai_rebot_b601_plugin/__init__.py" = ["PLC0415"]
"packages/physicalai-rebot-b601-plugin/src/physicalai_rebot_b601_plugin/dm.py" = ["ARG002", "PLR0913"]
"packages/physicalai-rebot-b601-plugin/src/physicalai_rebot_b601_plugin/rs.py" = ["ARG002", "PLR0913"]
"packages/physicalai-rebot-b601-plugin/src/physicalai_rebot_b601_plugin/leader.py" = ["ARG002", "PLR6301"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.pylint]
max-args = 15

[tool.pytest.ini_options]
testpaths = "packages/"
addopts = "--import-mode=importlib"

[tool.markdownlint]
default = true

[tool.markdownlint.MD001]
enabled = true

[tool.markdownlint.MD013]
line_length = 1000

[tool.markdownlint.MD024]
allow_different_nesting = true
siblings_only = true

[tool.markdownlint.MD033]
enabled = false

[tool.markdownlint.MD034]
enabled = false

[tool.markdownlint.MD036]
enabled = false

[tool.markdownlint.MD041]
enabled = false

[tool.markdownlint.MD042]
enabled = false

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@abstractmethod",
    "pass",
    "raise ImportError",
    "raise ValueError",
    "except ImportError:",
]

[tool.coverage.paths]
source = ["packages/*/src"]

[tool.pyrefly]
python-version = "3.12"
search-path = ["packages/physicalai-rebot-b601-plugin/src"]
project-includes = ["packages/physicalai-rebot-b601-plugin/src"]
