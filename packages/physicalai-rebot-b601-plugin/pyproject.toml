[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "physicalai-rebot-b601-plugin"
dynamic = ["version"]
description = "Third-party Seeed reBot B601 robot arm plugin for PhysicalAI"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = [
    "physicalai>=0.1.1",
    "numpy>=1.24",
    "loguru>=0.7",
    "motorbridge>=0.4.4",
    "motorbridge-smart-servo>=0.0.4",
    "pydantic>=2.0",
]

[project.optional-dependencies]
tests = ["pytest"]

[project.urls]
Homepage = "https://github.com/MarkRedeman/physicalai-rebot-b601-plugin"
Repository = "https://github.com/MarkRedeman/physicalai-rebot-b601-plugin"
Issues = "https://github.com/MarkRedeman/physicalai-rebot-b601-plugin/issues"

[project.entry-points."physicalai.studio.catalog_plugins"]
rebot-b601 = "physicalai_rebot_b601_plugin.studio_catalog:register_physicalai_studio_plugin"

[tool.hatch.version]
source = "vcs"
raw-options = { search_parent_directories = true }

[tool.hatch.build.targets.wheel]
packages = ["src/physicalai_rebot_b601_plugin"]

[tool.hatch.build.targets.wheel.force-include]
"urdf" = "urdf"

[tool.hatch.build.targets.sdist]
include = [
    "src/physicalai_rebot_b601_plugin/**",
    "urdf/**",
    "README.md",
    "pyproject.toml",
    "LICENSE",
]
